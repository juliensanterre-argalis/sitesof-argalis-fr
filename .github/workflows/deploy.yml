name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Mailgun API key
        run: |
          sed -i "s|VOTRE_CLE_API_MAILGUN|${{ secrets.MAILGUN_API_KEY }}|g" source/send-email.php

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.SFTP_USER }}","${{ secrets.SFTP_PASSWORD }}" \
            sftp://${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_PORT }} << EOF
            set sftp:auto-confirm yes
            set net:max-retries 3
            put source/index.html -o ${{ secrets.SFTP_PATH }}/source/index.html
            put source/script.js -o ${{ secrets.SFTP_PATH }}/source/script.js
            put source/style.css -o ${{ secrets.SFTP_PATH }}/source/style.css
            put source/filters-functions.js -o ${{ secrets.SFTP_PATH }}/source/filters-functions.js
            put source/range-slider.js -o ${{ secrets.SFTP_PATH }}/source/range-slider.js
            put source/fictive-data.js -o ${{ secrets.SFTP_PATH }}/source/fictive-data.js
            put source/send-email.php -o ${{ secrets.SFTP_PATH }}/source/send-email.php
            put dummy/index.html -o ${{ secrets.SFTP_PATH }}/dummy/index.html
          EOF
